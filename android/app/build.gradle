apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

react {
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion = "21.4.7075529"
    compileSdkVersion 34

    namespace "com.sillyandroid"

    buildFeatures {
        buildConfig = true
    }

    defaultConfig {
        applicationId "com.sillyandroid"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion 34
        versionCode 14
        versionName "1.1.4"

        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main {
            assets {
                srcDirs = ['src/main/assets']
            }
        }
    }

    aaptOptions {
        // 添加 'zip' 以避免对内置资源包进行二次压缩，提高读取速度
        noCompress 'js', 'json', 'yaml', 'yml', 'txt', 'html', 'css', 'node', 'zip'
        ignoreAssetsPattern '!.git:!.svn:!.DS_Store'
    }

    packagingOptions {
        pickFirst 'lib/armeabi-v7a/libc++_shared.so'
        pickFirst 'lib/arm64-v8a/libc++_shared.so'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/NOTICE'
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

configurations.all {
    resolutionStrategy {
        force 'androidx.webkit:webkit:1.7.0'
        force 'androidx.annotation:annotation-experimental:1.3.1'
    }
}

dependencies {
    implementation project(':nodejs-mobile-react-native')
    implementation("com.facebook.react:react-android")

    //debugImplementation("com.facebook.flipper:flipper:${FLIPPER_VERSION}")
    //debugImplementation("com.facebook.flipper:flipper-network-plugin:${FLIPPER_VERSION}") {
//        exclude group:'com.squareup.okhttp3', module:'okhttp'
//    }

    //debugImplementation("com.facebook.flipper:flipper-fresco-plugin:${FLIPPER_VERSION}")
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
