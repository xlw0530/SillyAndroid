// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "33.0.0"
        minSdkVersion = 24
        compileSdkVersion = 33
        targetSdkVersion = 33

        // We use NDK 23 which has both M1 support and is the side-by-side NDK version from AGP.
        ndkVersion = "23.1.7779620"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.1")

        classpath("com.facebook.react:react-native-gradle-plugin")
    }
}

allprojects {
    repositories {
        mavenLocal()
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            // Android JSC is installed from npm
            url("$rootDir/../node_modules/jsc-android/dist")
        }
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            android {
                // 如果没有设置 namespace，尝试自动从 Manifest 读取
                if (namespace == null) {
                    try {
                        def manifestFile = project.android.sourceSets.main.manifest.srcFile
                        if (manifestFile.exists()) {
                            def parser = new XmlSlurper()
                            def manifest = parser.parse(manifestFile)
                            def packageName = manifest.@package.text()
                            if (packageName && !packageName.isEmpty()) {
                                namespace packageName
                                println "Auto-fixed: Assigned namespace '${packageName}' to project '${project.name}'"
                            }
                        }
                    } catch (e) {
                        println "Auto-fix failed for ${project.name}: ${e.message}"
                    }
                }
            }
        }
    }
}
subprojects {
    configurations.all {
        resolutionStrategy {
            force 'androidx.browser:browser:1.5.0'
        }
    }
}
